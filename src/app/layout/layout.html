<div class="layout-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>StockAdmin</h2>

    <ul>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active"> Dashboard </a>
      </li>

      <li>
        <a routerLink="/products" routerLinkActive="active"> Productos </a>
      </li>

      <li>
        <a routerLink="/categories" routerLinkActive="active"> Categorías </a>
      </li>

      <li>
        <a routerLink="/movements" routerLinkActive="active"> Movimientos </a>
      </li>
    </ul>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <!-- Navbar -->
    <header class="navbar">
      <h3>Sistema de Gestión de Inventario</h3>

      <div class="navbar-user">
        <span>{{ authService.getCurrentUser()?.nombre }}</span>

        <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
      </div>
    </header>

    <!-- Dynamic Content -->
    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </div>
</div>
