<div class="layout-container">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed" [class.mobile-open]="showMobileMenu">
    <div class="sidebar-header">
      <h2 *ngIf="!sidebarCollapsed">StockAdmin</h2>
      <h2 *ngIf="sidebarCollapsed">SA</h2>
    </div>

    <ul>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMobileMenu()">
          <span class="nav-icon">📊</span>
          <span class="nav-text">Dashboard</span>
        </a>
      </li>

      <li>
        <a routerLink="/products" routerLinkActive="active" (click)="closeMobileMenu()">
          <span class="nav-icon">📦</span>
          <span class="nav-text">Productos</span>
        </a>
      </li>

      <li *ngIf="authService.isAdmin()">
        <a routerLink="/categories" routerLinkActive="active" (click)="closeMobileMenu()">
          <span class="nav-icon">🏷️</span>
          <span class="nav-text">Categorías</span>
        </a>
      </li>

      <li>
        <a routerLink="/movements" routerLinkActive="active" (click)="closeMobileMenu()">
          <span class="nav-icon">🔄</span>
          <span class="nav-text">Movimientos</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" *ngIf="isMobile && showMobileMenu" (click)="closeMobileMenu()"></div>

  <!-- Main -->
  <div class="main-content">
    <!-- Navbar -->
    <header class="navbar">
      <button class="menu-toggle" (click)="toggleSidebar()">
        <span class="hamburger" [class.active]="showMobileMenu">☰</span>
      </button>

      <h3>Sistema de Gestión de Inventario</h3>

      <div class="navbar-user">
        <button class="theme-toggle" (click)="toggleTheme()" [title]="isDarkMode ? 'Modo claro' : 'Modo oscuro'">
          {{ isDarkMode ? '☀️' : '🌙' }}
        </button>

        <span class="role-badge" [class.admin]="authService.isAdmin()">{{ authService.getCurrentUser()?.role === 'admin' ? 'Admin' : 'Empleado' }}</span>

        <span>{{ authService.getCurrentUser()?.nombre }}</span>

        <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
      </div>
    </header>

    <!-- Dynamic Content -->
    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </div>
</div>

<app-spinner [visible]="isNavigating"></app-spinner>
