<div class="categories-container">
  <div class="categories-header">
    <h1>Gestión de Categorías</h1>

    <input
      type="text"
      placeholder="Buscar categoría..."
      [(ngModel)]="searchTerm"
      class="search-input"
    />

    <button (click)="openModal()">+ Nueva Categoría</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let category of filteredCategories; let i = index">
        <td>{{ category.code }}</td>
        <td>{{ category.name }}</td>

        <td class="actions">
          <button class="edit-btn" (click)="editCategory(category, i)">Editar</button>

          <button class="delete-btn" (click)="openDeleteModal(i)">Eliminar</button>
        </td>
      </tr>

      <tr *ngIf="filteredCategories.length === 0">
        <td colspan="3" class="empty-message">Categoría no encontrada</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- MODAL CREATE / EDIT -->
<div class="modal-backdrop" *ngIf="showModal">
  <div class="modal">
    <h2>
      {{ isEditing ? 'Editar Categoría' : 'Nueva Categoría' }}
    </h2>

    <div class="form-group">
      <label>Código</label>

      <input type="text" [value]="previewCode" disabled />
    </div>

    <div class="form-group">
      <label>Nombre</label>

      <input
        type="text"
        [(ngModel)]="newCategory"
        [class.input-error]="formErrors.name"
        (input)="clearNameError()"
      />

      <div class="error-message" *ngIf="formErrors.name">
        {{ formErrors.name }}
      </div>
    </div>

    <div class="modal-actions">
      <button class="save-btn" (click)="addCategory()">
        {{ isEditing ? 'Actualizar' : 'Guardar' }}
      </button>

      <button class="cancel-btn" (click)="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-backdrop" *ngIf="showDeleteModal">
  <div class="modal delete-modal">
    <h2>Confirmar Eliminación</h2>

    <p>¿Deseas eliminar esta categoría?</p>

    <div class="modal-actions">
      <button class="cancel-btn" (click)="closeDeleteModal()">Cancelar</button>

      <button class="delete-btn" (click)="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>
