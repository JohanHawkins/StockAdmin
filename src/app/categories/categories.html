<div class="categories-container">
  <div class="categories-header">
    <h1>Categorías</h1>
  </div>

  <div class="add-category">
    <input type="text" placeholder="Nombre de la categoría" [(ngModel)]="newCategory" />

    <button (click)="addCategory()">Agregar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let category of categories">
        <td>{{ category.id }}</td>

        <td>{{ category.name }}</td>
      </tr>
    </tbody>
  </table>
</div>
