<div class="products-container">

    <div class="products-header">
        
        <h1>Gestión de Productos</h1>
        <input type="text" placeholder="Buscar producto..." [(ngModel)]="searchTerm" class="search-input">
        <button (click)="openModal()">
            + Nuevo Producto
        </button>

    </div>

    <table>

        <thead>

            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let product of filteredProducts; let i = index">

                <td>{{ product.code }}</td>
                <td>{{ product.name }}</td>
                <td>${{ product.price }}</td>
                <td>{{ product.stock }}</td>
                <td>{{ product.status }}</td>

                <td class="actions">

                    <button
                        class="edit-btn"
                        (click)="editProduct(product, i)">
                        Editar
                    </button>

                    <button
                        class="delete-btn"
                        (click)="openDeleteModal(i)">
                        Eliminar
                    </button>

                </td>

            </tr>

        </tbody>
        <tbody *ngIf="filteredProducts.length === 0">

            <tr>

                <td colspan="6" class="empty-message">

                    Producto no encontrado

                </td>

            </tr>

        </tbody>
    </table>

</div>

<!-- CREATE / EDIT MODAL -->

<div class="modal-backdrop" *ngIf="showModal">

    <div class="modal">

        <h2>
            {{ isEditing ? 'Editar Producto' : 'Nuevo Producto' }}
        </h2>

        <div class="form-group">

            <label>Código</label>

            <input
                type="text"
                [value]="newProduct.code"
                disabled>

        </div>

        <div class="form-group">

            <label>Nombre</label>

            <input
                type="text"
                [(ngModel)]="newProduct.name">

        </div>

        <div class="form-group">

            <label>Precio</label>

            <input
                type="number"
                [(ngModel)]="newProduct.price">

        </div>

        <div class="form-group">

            <label>Stock</label>

            <input
                type="number"
                [(ngModel)]="newProduct.stock">

        </div>

        <div class="modal-actions">

            <button
                class="save-btn"
                (click)="saveProduct()">

                {{ isEditing ? 'Actualizar' : 'Guardar' }}

            </button>

            <button
                class="cancel-btn"
                (click)="closeModal()">

                Cancelar

            </button>

        </div>

    </div>

</div>

<!-- DELETE MODAL -->

<div class="modal-backdrop" *ngIf="showDeleteModal">

    <div class="modal delete-modal">

        <h2>Confirmar Eliminación</h2>

        <p>
            ¿Deseas eliminar este producto?
        </p>

        <div class="modal-actions">

            <button
                class="cancel-btn"
                (click)="closeDeleteModal()">

                Cancelar

            </button>

            <button
                class="delete-btn"
                (click)="confirmDelete()">

                Eliminar

            </button>

        </div>

    </div>

</div>

<!-- TOAST -->

<app-toast
    [message]="toastMessage"
    [type]="toastType"
    [visible]="toastVisible">
</app-toast>
