<div class="products-container">

    <div class="products-header">

        <h1>Gestión de Productos</h1>

        <button (click)="openModal()">
            + Nuevo Producto
        </button>

    </div>

    <table>

        <thead>

            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let product of products">

                <td>{{ product.code }}</td>
                <td>{{ product.name }}</td>
                <td>${{ product.price }}</td>
                <td>{{ product.stock }}</td>
                <td>{{ product.status }}</td>

            </tr>

        </tbody>

    </table>

</div>

<!-- MODAL -->

<div class="modal-backdrop" *ngIf="showModal">

    <div class="modal">

        <h2>Nuevo Producto</h2>

        <div class="form-group">

            <label>Código</label>

            <input
                type="text"
                [(ngModel)]="newProduct.code">

        </div>

        <div class="form-group">

            <label>Nombre</label>

            <input
                type="text"
                [(ngModel)]="newProduct.name">

        </div>

        <div class="form-group">

            <label>Precio</label>

            <input
                type="number"
                [(ngModel)]="newProduct.price">

        </div>

        <div class="form-group">

            <label>Stock</label>

            <input
                type="number"
                [(ngModel)]="newProduct.stock">

        </div>

        <div class="modal-actions">

            <button class="save-btn" (click)="saveProduct()">
                Guardar
            </button>

            <button class="cancel-btn" (click)="closeModal()">
                Cancelar
            </button>

        </div>

    </div>

</div>
