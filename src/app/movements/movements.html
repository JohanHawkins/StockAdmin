<div class="movements-container">
  <div class="movements-header">
    <h1>Gestión de Movimientos</h1>

    <button (click)="openModal()">+ Nuevo Movimiento</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Producto</th>
        <th>Tipo</th>
        <th>Cantidad</th>
        <th>Fecha</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let movement of movements">
        <td>{{ movement.id }}</td>

        <td>{{ getProductName(movement.productCode) }}</td>

        <td>{{ movement.type }}</td>

        <td>{{ movement.quantity }}</td>

        <td>{{ movement.date | date: 'dd/MM/yyyy HH:mm' }}</td>
      </tr>

      <tr *ngIf="movements.length === 0">
        <td colspan="5" class="empty-message">No hay movimientos registrados</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- MODAL -->

<div class="modal-backdrop" *ngIf="showModal">
  <div class="modal">
    <h2>Nuevo Movimiento</h2>

    <div class="form-group">
      <label>Producto</label>

      <select [(ngModel)]="newMovement.productCode">
        <option value="">Seleccionar producto</option>

        <option *ngFor="let product of products" [value]="product.code">
          {{ product.name }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>Tipo</label>

      <select [(ngModel)]="newMovement.type" [disabled]="!newMovement.productCode">
        <option value="">Seleccionar tipo</option>

        <option value="ENTRADA">ENTRADA</option>

        <option value="SALIDA">SALIDA</option>
      </select>
    </div>

    <div class="form-group">
      <label>Cantidad</label>

      <input
        type="number"
        min="1"
        [(ngModel)]="newMovement.quantity"
        [disabled]="!newMovement.productCode || !newMovement.type"
      />
    </div>

    <div class="modal-actions">
      <button
        class="save-btn"
        (click)="addMovement()"
        [disabled]="!newMovement.productCode || !newMovement.type || newMovement.quantity <= 0"
      >
        Guardar
      </button>

      <button class="cancel-btn" (click)="closeModal()">Cancelar</button>
    </div>
  </div>
</div>
