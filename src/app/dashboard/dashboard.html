<div class="dashboard-container">
  <h1>Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h2>{{ totalProducts }}</h2>

      <p>Total Productos</p>
    </div>

    <div class="card">
      <h2>{{ totalStock }}</h2>

      <p>Stock Total</p>
    </div>

    <div class="card">
      <h2>${{ inventoryValue }}</h2>

      <p>Valor Inventario</p>
    </div>

    <div class="card">
      <h2>{{ activeProducts }}</h2>

      <p>Productos Activos</p>
    </div>
  </div>
</div>
