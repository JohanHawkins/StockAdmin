<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">📦</div>
    </div>

    <h1>StockAdmin</h1>
    <p class="subtitle">Sistema de Gestión de Inventario</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>

        <input
          type="email"
          id="email"
          placeholder="Ingrese su correo"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>

        <input
          type="password"
          id="password"
          placeholder="Ingrese su contraseña"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
        />
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Ingresar</span>
        <span *ngIf="isLoading" class="login-loading">
          <span class="spinner"></span>
          Ingresando...
        </span>
      </button>
    </form>

    <div class="login-footer">
      <p>© 2024 StockAdmin. Todos los derechos reservados.</p>
      <div class="test-accounts">
        <p><strong>Cuentas de prueba:</strong></p>
        <p>Admin: admin@admin.com / 123456</p>
        <p>Usuario: user@user.com / 123456</p>
      </div>
    </div>
  </div>
</div>
