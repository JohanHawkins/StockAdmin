<div class="login-container">

    <div class="login-card">

        <h1>Sistema Inventario Web</h1>

        <h2>Iniciar Sesión</h2>

        <form>

            <div class="form-group">
                <label>Email</label>

                <input 
                    type="email"
                    placeholder="Ingrese su correo">
            </div>

            <div class="form-group">
                <label>Contraseña</label>

                <input 
                    type="password"
                    placeholder="Ingrese su contraseña">
            </div>

            <button type="submit">
                Ingresar
            </button>

        </form>

    </div>

</div>
